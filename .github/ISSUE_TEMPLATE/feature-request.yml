name: Feature Request
description: Suggest an idea for Signhify
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Before posting, please search existing issues to avoid duplicates.
  - type: checkboxes
    id: verification
    attributes:
      label: Verification
      options:
        - label: I have searched existing issues and this feature has not been requested yet
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What is the use case?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What alternatives have you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information, mockups, or examples.
