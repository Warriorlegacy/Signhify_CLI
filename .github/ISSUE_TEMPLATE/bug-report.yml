name: Bug Report
description: Report a bug to help us improve
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Install signhify
        2. Run `signhify run "..." --auto`
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Signhify Version
      description: Run `npx signhify --version` or check package.json
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: terminal
    attributes:
      label: Terminal / Environment
      description: Which terminal are you using? Any relevant environment details?
      placeholder: "e.g. iTerm2 on macOS, or WSL2 on Windows"
  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste any relevant logs or attach screenshots.
